services:
  cursor-agent-api-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: cursor-agent-api-proxy:local
    container_name: cursor-agent-api-proxy
    ports:
      - "${PORT:-4646}:${PORT:-4646}"
    environment:
      PORT: ${PORT:-4646}
      CURSOR_API_KEY: ${CURSOR_API_KEY:?Set CURSOR_API_KEY in .env (see .env.example)}
      CURSOR_DEBUG: ${CURSOR_DEBUG:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.PORT||4646)+'/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
