name: docker-smoke

# Build the Docker image on PRs (and on demand) without pushing, to catch
# Dockerfile / dependency / compile regressions before merge.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cursor-agent-api-proxy:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
